<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Key Received</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #0f0f12;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #16161a;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.6);
            text-align: center;
            max-width: 450px;
            width: 100%;
            border: 1px solid #24242b;
        }
        .icon-box {
            margin-bottom: 20px;
        }
        .success-icon {
            width: 64px;
            height: 64px;
            fill: #39d353;
        }
        h1 {
            font-size: 24px;
            margin-bottom: 10px;
            color: #ffffff;
        }
        p {
            color: #949c9e;
            font-size: 14px;
            line-height: 1.5;
            margin-bottom: 25px;
        }
        .key-box {
            background-color: #24242b;
            padding: 16px;
            border-radius: 6px;
            font-size: 18px;
            font-family: monospace;
            color: #39d353;
            word-break: break-all;
            margin-bottom: 25px;
            border: 1px solid #30363d;
            letter-spacing: 1px;
        }
        .btn-group {
            display: flex;
            gap: 12px;
            justify-content: center;
        }
        button, .btn-link {
            padding: 12px 24px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            border: none;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        .btn-copy {
            background-color: #39d353;
            color: #0f0f12;
        }
        .btn-copy:hover {
            background-color: #2ea043;
        }
        .btn-discord {
            background-color: #5865F2;
            color: #ffffff;
        }
        .btn-discord:hover {
            background-color: #4752C4;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="icon-box">
        <svg class="success-icon" viewBox="0 0 24 24">
            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
        </svg>
    </div>
    <h1>Key Received in Discord!</h1>
    <p>Your license key is now active and linked to your Discord account. You can copy it below.</p>
    
    <div class="key-box" id="key-container">Loading...</div>
    
    <div class="btn-group">
        <button class="btn-copy" onclick="copyKey()">Copy Key</button>
        <a href="https://discord.com" target="_blank" class="btn-link btn-discord">Open Discord</a>
    </div>
</div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const key = urlParams.get('key');
    const container = document.getElementById('key-container');

    if (key) {
        container.textContent = key;
    } else {
        container.textContent = "Error: Key not found.";
    }

    function copyKey() {
        if (key) {
            navigator.clipboard.writeText(key);
            alert("Copied!");
        }
    }
</script>

</body>
</html>
